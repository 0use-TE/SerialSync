name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_PATH: SerialSync.Browser/SerialSync.Browser.csproj
  TFM: net10.0-browser

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools
        run: dotnet workload install wasm-tools

      - name: Publish browser app
        run: dotnet publish "${{ env.PROJECT_PATH }}" -c Release -o release --nologo

      - name: Prepare site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site
          cp -r release/wwwroot/. site/
          touch site/.nojekyll
          cp site/index.html site/404.html
          REPO="${GITHUB_REPOSITORY#*/}"
          sed -i "s#<base href=\"/\"#<base href=\"/${REPO}/\"#g" site/index.html

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          clean: true
